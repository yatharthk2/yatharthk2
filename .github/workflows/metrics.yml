name: Refresh README cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch cards
        run: |
          mkdir -p cards
          fetch() {
            local url="$1"
            local output="$2"
            local tmp
            tmp="$(mktemp)"
            for attempt in 1 2 3; do
              if curl -fsSL --max-time 45 -o "$tmp" "$url" \
                && head -c 1000 "$tmp" | grep -q '<svg' \
                && ! grep -q 'Something went wrong' "$tmp"; then
                mv "$tmp" "$output"
                echo "refreshed $output"
                return 0
              fi
              echo "attempt $attempt failed for $output, retrying..."
              sleep 10
            done
            echo "all attempts failed for $output; keeping existing copy"
            rm -f "$tmp"
          }

          fetch "https://github-readme-stats.vercel.app/api?username=yatharthk2&show_icons=true&theme=tokyonight&hide_border=true&count_private=true" "cards/stats.svg"
          fetch "https://github-readme-streak-stats.herokuapp.com/?user=yatharthk2&theme=tokyonight&hide_border=true" "cards/streak.svg"
          fetch "https://github-readme-stats.vercel.app/api/top-langs/?username=yatharthk2&layout=compact&theme=tokyonight&hide_border=true" "cards/top-langs.svg"
          fetch "https://github-profile-trophy.vercel.app/?username=yatharthk2&theme=algolia&no-frame=true&row=1&column=7" "cards/trophy.svg"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh README cards"
            git push
          fi

  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: yatharthk2
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
