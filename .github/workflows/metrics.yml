name: Refresh README assets

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  streak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch streak card
        run: |
          mkdir -p cards
          tmp="$(mktemp)"
          for attempt in 1 2 3; do
            if curl -fsSL --max-time 45 -o "$tmp" \
              "https://github-readme-streak-stats.herokuapp.com/?user=yatharthk2&theme=tokyonight&hide_border=true" \
              && head -c 1000 "$tmp" | grep -q '<svg' \
              && ! grep -q 'Something went wrong' "$tmp"; then
              mv "$tmp" cards/streak.svg
              echo "refreshed cards/streak.svg"
              exit 0
            fi
            echo "attempt $attempt failed, retrying..."
            sleep 10
          done
          echo "all attempts failed; keeping existing cards/streak.svg"
          rm -f "$tmp"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/streak.svg
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: refresh streak card"
            git push
          fi

  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: yatharthk2
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
